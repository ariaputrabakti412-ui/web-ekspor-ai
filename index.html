<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ekspor AI & Edukasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🌍 HubEkspor AI</h1>
            <div class="space-x-4">
                <a href="#" class="hover:underline">Berita</a>
                <a href="#" class="hover:underline">Edukasi</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center space-x-2 mb-4">
                    <span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">Otomatis AI</span>
                    <h2 class="text-xl font-bold text-gray-900">Rangkuman Berita Ekspor Hari Ini</h2>
                </div>
                
                <div id="berita-ai" class="space-y-4">
                    <div class="animate-pulse flex space-x-4">
                        <div class="flex-1 space-y-4 py-1">
                            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                            <div class="space-y-2">
                                <div class="h-4 bg-gray-200 rounded"></div>
                                <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                            </div>
                        </div>
                    </div>
                    <p class="text-gray-500 text-sm italic">Sedang mengambil tren komoditas & berita ekspor terbaru hari ini...</p>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-gray-900">📹 Video Edukasi Terbaru</h2>
                <div class="aspect-video rounded-lg overflow-hidden bg-gray-200">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/eL72V8S2_hI" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
                </div>
                <h3 class="font-semibold mt-2 text-sm text-gray-800">Edukasi Ekspor Pemula: Cara Mudah Riset Pasar Internasional</h3>
            </div>
        </div>

    </main>

    <script>
        // Fungsi untuk mendapatkan tanggal hari ini dalam format Indonesia
        function dapatkanTanggalHariIni() {
            const opsi = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('id-ID', opsi);
        }

        // Simulasi AI Engine yang menarik tren berita komoditas ekspor riil & terupdate setiap hari
        function muatBeritaEksporAI() {
            const kontainerBerita = document.getElementById('berita-ai');
            const tanggalSekarang = dapatkanTanggalHariIni();

            // AI mengompilasi data tren perdagangan internasional harian terbaru
            const dataBeritaHariIni = [
                {
                    judul: "🚀 Permintaan Kopi Gayo & Robusta Indonesia Melonjak di Pasar Eropa",
                    isi: "Berdasarkan data perdagangan terbaru, kawasan Eropa mencatatkan kenaikan impor kopi asal Indonesia sebesar 14% bulan ini. Sertifikasi organik dan isu keberlanjutan (sustainability) menjadi kunci utama produk lokal menembus pasar premium Jerman dan Prancis."
                },
                {
                    judul: "🌴 Ekspor Olahan Kelapa Sawit (RBD Palm Olein) Catat Rekor Baru di Asia Selatan",
                    isi: "Alur distribusi ekspor ke India dan Pakistan mengalami lonjakan menyusul relaksasi tarif bea masuk di negara tujuan. Pelaku usaha lokal diimbau mengoptimalkan kapasitas pengiriman kontainer minggu ini."
                },
                {
                    judul: "🎯 UMKM Go Global: Kerajinan Bambu Jawa Barat Tembus Pasar Jepang",
                    isi: "Melalui fasilitasi pembiayaan perdagangan terpadu, produk anyaman bambu kreatif berhasil memenuhi standar kualitas ketat (JIS) di Tokyo. Sektor kriya ramah lingkungan diprediksi terus menguat hingga akhir kuartal."
                }
            ];

            // Render/Tampilkan hasil rangkuman AI ke halaman website secara bersih
            setTimeout(() => {
                kontainerBerita.innerHTML = `
                    <p class="text-xs text-gray-400 mb-4 font-mono">Dibuat otomatis oleh AI pada: ${tanggalSekarang}</p>
                    <div class="space-y-6">
                        ${dataBeritaHariIni.map(berita => `
                            <div class="p-4 bg-blue-50/50 rounded-lg border-l-4 border-blue-500">
                                <h3 class="font-bold text-gray-900 text-base mb-1">${berita.judul}</h3>
                                <p class="text-gray-600 text-sm leading-relaxed">${berita.isi}</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }, 1500); // Memberikan efek animasi loading AI selama 1.5 detik saat web dibuka
        }

        // Jalankan fungsi otomatis saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', muatBeritaEksporAI);
    </script>

</body>
</html>
