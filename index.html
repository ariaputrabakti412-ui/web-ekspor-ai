<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal HubEkspor AI - Live Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🌍 HubEkspor AI</h1>
            <div class="space-x-4">
                <a href="#" class="hover:underline">Berita</a>
                <a href="#" class="hover:underline">Edukasi</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6 space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-2">
                    <span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded-full animate-pulse">● Live Gemini AI</span>
                    <h2 class="text-xl font-bold text-gray-900">Rangkuman Berita Ekspor Hari Ini</h2>
                </div>
                <button onclick="ambilBeritaLangsung()" class="text-xs bg-blue-100 text-blue-600 hover:bg-blue-200 px-3 py-1.5 rounded-lg font-medium transition">
                    🔄 Minta Berita Baru (Live AI)
                </button>
            </div>
            
            <div id="berita-ai" class="text-gray-700 leading-relaxed space-y-4">
                <div class="animate-pulse space-y-3 py-4">
                    <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                    <div class="h-4 bg-gray-200 rounded w-full"></div>
                    <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        async function ambilBeritaLangsung() {
            const kontainerBerita = document.getElementById('berita-ai');
            
            kontainerBerita.innerHTML = `
                <p class="text-sm text-gray-500 italic animate-pulse py-4">⏳ Menghubungi server Vercel untuk mengambil data AI secara aman...</p>
            `;

            // URL menembak fungsi backend internal Vercel Serverless kita
            const url = "/api/get-news";

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Gagal mengambil data dari server");
                }

                // Merapikan format markdown bawaan AI agar ramah di halaman HTML
                let teksRapi = data.berita
                    .replace(/\n/g, '<br>')
                    .replace(/\*/g, '•')
                    .replace(/-/g, '•')
                    .replace(/##/g, '<br><strong class="text-blue-600">')
                    .replace(/#/g, '');

                kontainerBerita.innerHTML = `
                    <div class="bg-blue-50/60 p-5 rounded-xl border border-blue-100 text-base font-normal shadow-sm">
                        ${teksRapi}
                    </div>
                `;

            } catch (error) {
                kontainerBerita.innerHTML = `
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-xl">
                        <p class="text-red-700 text-sm font-semibold">Gagal Memuat Rangkuman AI</p>
                        <p class="text-red-500 text-xs mt-1">Kendala Server: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Daftarkan ke objek window agar tombol onclick HTML bisa mendeteksi
        window.ambilBeritaLangsung = ambilBeritaLangsung;

        // Jalankan otomatis begitu halaman web terbuka sempurna
        document.addEventListener('DOMContentLoaded', ambilBeritaLangsung);
    </script>
</body>
</html>
