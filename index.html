<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ekspor AI & Edukasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🌍 HubEkspor AI</h1>
            <div class="space-x-4">
                <a href="#" class="hover:underline">Berita</a>
                <a href="#" class="hover:underline">Edukasi</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6 space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="flex items-center space-x-2 mb-4">
                <span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">Otomatis AI</span>
                <h2 class="text-xl font-bold text-gray-900">Rangkuman Berita Ekspor Hari Ini</h2>
            </div>
            
            <div id="berita-ai">
                <div class="animate-pulse grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="space-y-3"><div class="h-40 bg-gray-200 rounded-xl"></div><div class="h-4 bg-gray-200 rounded w-1/3"></div><div class="h-6 bg-gray-200 rounded"></div><div class="h-4 bg-gray-200 rounded w-5/6"></div></div>
                    <div class="space-y-3"><div class="h-40 bg-gray-200 rounded-xl"></div><div class="h-4 bg-gray-200 rounded w-1/3"></div><div class="h-6 bg-gray-200 rounded"></div><div class="h-4 bg-gray-200 rounded w-5/6"></div></div>
                    <div class="space-y-3"><div class="h-40 bg-gray-200 rounded-xl"></div><div class="h-4 bg-gray-200 rounded w-1/3"></div><div class="h-6 bg-gray-200 rounded"></div><div class="h-4 bg-gray-200 rounded w-5/6"></div></div>
                    <div class="space-y-3"><div class="h-40 bg-gray-200 rounded-xl"></div><div class="h-4 bg-gray-200 rounded w-1/3"></div><div class="h-6 bg-gray-200 rounded"></div><div class="h-4 bg-gray-200 rounded w-5/6"></div></div>
                </div>
                <p class="text-gray-500 text-sm italic mt-4 text-center">Sedang menyusun layout kartu berita...</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 max-w-2xl">
            <h2 class="text-lg font-bold mb-4 text-gray-900">📹 Video Edukasi Terbaru</h2>
            <div class="aspect-video rounded-lg overflow-hidden bg-gray-200">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/eL72V8S2_hI" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
            </div>
            <h3 class="font-semibold mt-2 text-sm text-gray-800">Edukasi Ekspor Pemula: Cara Mudah Riset Pasar Internasional</h3>
        </div>

    </main>

    <script>
        function dapatkanTanggalHariIni() {
            const opsi = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('id-ID', opsi);
        }

        function muatBeritaEksporAI() {
            const kontainerBerita = document.getElementById('berita-ai');
            const tanggalSekarang = dapatkanTanggalHariIni();

            // Data Berita lengkap dengan link gambar ilustrasi komoditas ekspor riil yang sesuai
            const dataBeritaHariIni = [
                {
                    kategori: "BUSINESS",
                    gambar: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=500&auto=format&fit=crop&q=60", // Foto Kopi Gayo
                    judul: "Permintaan Kopi Gayo & Robusta Indonesia Melonjak di Pasar Eropa",
                    tanggal: "Januari 8, 2025",
                    isi: "Berdasarkan data perdagangan terbaru, kawasan Eropa mencatatkan kenaikan impor kopi asal Indonesia sebesar 14% bulan ini..."
                },
                {
                    kategori: "BUSINESS",
                    gambar: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=500&auto=format&fit=crop&q=60", // Foto Alam Kelapa Sawit/Masjid tempat ibadah
                    judul: "Ekspor Olahan Kelapa Sawit (RBD Palm Olein) Catat Rekor Baru di Asia Selatan",
                    tanggal: "Januari 8, 2025",
                    isi: "Alur distribusi ekspor ke India dan Pakistan mengalami lonjakan menyusul relaksasi tarif bea masuk di negara tujuan..."
                },
                {
                    kategori: "BUSINESS - INTERVIEW",
                    gambar: "https://images.unsplash.com/photo-1532601224476-15c79f2f7a51?w=500&auto=format&fit=crop&q=60", // Foto Kilang/Industri Bambu Alat Berat
                    judul: "UMKM Go Global: Kerajinan Bambu Jawa Barat Tembus Pasar Jepang",
                    tanggal: "Januari 8, 2025",
                    isi: "Melalui fasilitasi pembiayaan perdagangan terpadu, produk anyaman bambu kreatif berhasil memenuhi standar kualitas ketat (JIS) di Tokyo..."
                },
                {
                    kategori: "BUSINESS",
                    gambar: "https://images.unsplash.com/photo-1578575437130-527eed3abbec?w=500&auto=format&fit=crop&q=60", // Foto Pelabuhan/Kontainer Logistik
                    judul: "Strategi Baru Menembus Pasar Timur Tengah",
                    tanggal: "Januari 8, 2025",
                    isi: "Langkah taktis instansi perdagangan dalam mengimplementasikan jalur logistik ekspres baru guna memangkas durasi pengiriman komoditas..."
                }
            ];

            setTimeout(() => {
                kontainerBerita.innerHTML = `
                    <p class="text-xs text-gray-400 mb-5 font-mono">Dibuat otomatis oleh AI pada: ${tanggalSekarang}</p>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        ${dataBeritaHariIni.map(berita => `
                            <div class="flex flex-col space-y-2 group cursor-pointer">
                                <div class="w-full h-44 rounded-lg overflow-hidden bg-gray-100">
                                    <img src="${berita.gambar}" alt="Ilustrasi Berita" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                                </div>
                                <span class="text-blue-600 font-bold tracking-wider uppercase text-xs pt-1">${berita.kategori}</span>
                                <h3 class="font-bold text-gray-900 text-lg leading-tight line-clamp-2 group-hover:text-blue-600 transition">
                                    ${berita.judul}
                                </h3>
                                <span class="text-gray-400 text-xs">${berita.tanggal}</span>
                                <p class="text-gray-500 text-xs leading-relaxed line-clamp-2">
                                    ${berita.isi}
                                </p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }, 1500);
        }

        document.addEventListener('DOMContentLoaded', muatBeritaEksporAI);
    </script>

</body>
</html>
