<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ekspor AI & Edukasi</title>
    <!-- Kita pakai Tailwind CSS online biar langsung keren tanpa ribet -->
    <script src="<script src="https://cdn.tailwindcss.com"></script>"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- NAVIGATION BAR -->
    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🌍 Ekspor AI</h1>
            <div class="space-x-4">
                <a href="#" class="hover:underline">Berita</a>
                <a href="#" class="hover:underline">Edukasi</a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Kolom Berita AI (Kiri & Tengah) -->
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center space-x-2 mb-4">
                    <span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">Otomatis AI</span>
                    <h2 class="text-xl font-bold text-gray-900">Rangkuman Berita Ekspor Hari Ini</h2>
                </div>
                <!-- Tempat Berita AI Muncul -->
                <div id="berita-ai" class="text-gray-600 leading-relaxed">
                    Sedang memuat berita terbaru dan merangkum dengan AI...
                </div>
            </div>
        </div>

        <!-- Kolom Video Edukasi (Kanan) -->
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-4 text-gray-900">📹 Video Edukasi Terbaru</h2>
                <div class="aspect-video rounded-lg overflow-hidden bg-gray-200">
                    <!-- Contoh Embed Video Youtube (Bisa diganti nanti) -->
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
                </div>
                <h3 class="font-semibold mt-2 text-sm text-gray-800">Edukasi Ekspor Pemula: Cara Riset Pasar Internasional</h3>
            </div>
        </div>

    </main>

</body>
</html>
